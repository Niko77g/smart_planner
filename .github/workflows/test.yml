name: Smart Planner

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: smart_planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d smart_planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    env:
      DATABASE_URL: postgresql+psycopg://admin:admin@localhost:5432/smart_planner
      JWT_SECRET_KEY: test-secret-key-with-at-least-32-characters
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pytest
      - run: docker build -t smart-planner .






